name: CI/CD MedSchedule

on:
    push:
        branches: [main, develop, backend, frontend]
    pull_request:
        branches: [main, develop]

jobs:
    lint-format:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npx eslint resources/js --ext .js --max-warnings=50 || true

            - name: Run Prettier check
              run: npx prettier --check "resources/**/*.{js,css}" || true

    php-tests:
        runs-on: ubuntu-latest

        services:
            mysql:
                image: mysql:8.0
                env:
                    MYSQL_ROOT_PASSWORD: password
                    MYSQL_DATABASE: medschedule_test
                ports:
                    - 3306:3306
                options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  extensions: mbstring, pdo, pdo_mysql

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Install Node dependencies
              run: npm ci

            - name: Build Vite assets
              run: npm run build

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Copy .env
              run: cp .env.example .env

            - name: Generate key
              run: php artisan key:generate

            - name: Run migrations
              env:
                  DB_CONNECTION: mysql
                  DB_HOST: 127.0.0.1
                  DB_PORT: 3306
                  DB_DATABASE: medschedule_test
                  DB_USERNAME: root
                  DB_PASSWORD: password
              run: php artisan migrate --force

            - name: Run tests
              env:
                  DB_CONNECTION: mysql
                  DB_HOST: 127.0.0.1
                  DB_PORT: 3306
                  DB_DATABASE: medschedule_test
                  DB_USERNAME: root
                  DB_PASSWORD: password
              run: php artisan test --stop-on-failure
